<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quote post · Antojos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --cream: #EFEAD8;
    --cream-deep: #E2DCC6;
    --cream-light: #F5F1E2;
    --ink: #1a1a1a;
    --ink-soft: #3a3a3a;
    --ink-mute: #6a6a6a;
    --accent: #c8492c;
    --hairline: rgba(26,26,26,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: #1a1a1a; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.wrap { display:flex; justify-content:center; padding: 40px 16px; }

.slide {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
    background: var(--cream);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    color: var(--ink);
}
@media (max-width: 1160px) {
    .slide {
        transform-origin: top center;
        transform: scale(calc((100vw - 32px) / 1080));
        margin-bottom: calc(1080px * ((100vw - 32px) / 1080) - 1080px);
    }
}

.slide::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background:
        radial-gradient(ellipse 420px 280px at 18% 22%, rgba(0,0,0,0.035), transparent 60%),
        radial-gradient(ellipse 380px 240px at 82% 78%, rgba(0,0,0,0.028), transparent 60%),
        radial-gradient(ellipse at 50% 50%, var(--cream-light), var(--cream-deep));
}
.slide::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='480' height='480'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.07 0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.35; mix-blend-mode: multiply;
}
.frame { position:absolute; inset:48px; border:1px solid var(--hairline); z-index:2; pointer-events:none; }
.inner { position:absolute; inset:0; z-index:3; padding: 110px 110px; display:flex; flex-direction:column; justify-content:space-between; }

.brand {
    font-family: 'Inter'; font-size: 14px; letter-spacing: 6px;
    text-transform: uppercase; font-weight: 800; color: var(--ink);
    text-align: center;
}

.q-mark {
    font-family: 'Playfair Display'; font-style: italic;
    font-size: 240px; line-height: 0.5; color: var(--accent);
    text-align: center; margin: 30px 0 -10px;
    font-weight: 400;
}

.quote {
    font-family: 'Playfair Display'; font-weight: 700;
    font-size: 96px; line-height: 1.06; letter-spacing: -2px;
    text-align: center; color: var(--ink);
    padding: 0 20px;
}
.quote em { font-style: italic; font-weight: 500; color: var(--accent); }
.quote .small {
    display: block; font-size: 56px; font-weight: 500;
    font-style: italic; color: var(--ink-soft);
    margin-top: 36px; line-height: 1.2;
}

.divider {
    margin: 40px auto;
    width: 60px; height: 1px; background: var(--accent);
}

.attribution {
    text-align: center;
    font-family: 'Playfair Display'; font-style: italic;
    font-size: 30px; color: var(--accent);
    font-weight: 500;
}
.attribution .by {
    display: block;
    font-family: 'Inter'; font-style: normal;
    font-size: 13px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--ink-mute);
    margin-top: 10px; font-weight: 600;
}

.deco-star {
    position: absolute;
    font-family: 'Playfair Display'; font-style: italic;
    color: var(--accent); opacity: 0.55;
    pointer-events: none; line-height: 1; font-size: 80px;
}
</style>
</head>
<body>
<div class="wrap">
<div class="slide">
    <div class="frame"></div>
    <div class="deco-star" style="top: 180px; left: 130px;">✦</div>
    <div class="deco-star" style="bottom: 200px; right: 130px; font-size: 60px;">✦</div>
    <div class="inner">
        <div class="brand">REBOOT · LIFESTYLE</div>

        <div style="margin: auto 0;">
            <div class="q-mark">"</div>
            <div class="quote">
                Los antojos<br>
                no son falta<br>
                <em>de voluntad.</em>
                <span class="small">Son química — y se pueden hackear.</span>
            </div>
            <div class="divider"></div>
        </div>

        <div class="attribution">
            Arie Reboot
            <span class="by">@ariereboot · 30 días gratis · 11 mayo</span>
        </div>
    </div>
</div>
</div>
</body>
</html>
