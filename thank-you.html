<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Bienvenido al Reboot 30! · Tu cupo está reservado</title>
    <meta name="description" content="Tu cupo está reservado oficialmente en el Programa Reboot 30. Arranca el 4 de mayo 2026.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black-seed: #0f0f0f;
            --deep-neural: #02251f;
            --oxygen-blue: #76d3d1;
            --earth-carrot: #e85c26;
            --pure-reset: #f3f6fb;
            --arie-yellow: #fae62b;
            --wa-green: #25D366;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', -apple-system, sans-serif;
            background: #f0f0f0;
            -webkit-font-smoothing: antialiased;
        }

        /* Container principal 1080x1080 (exportable como imagen si hace falta) */
        .thank-you-card {
            width: 1080px;
            height: 1080px;
            max-width: 100vw;
            max-height: 100vh;
            margin: 0 auto;
            background: var(--black-seed);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 72px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        /* Efectos de fondo */
        .thank-you-card::before {
            content: "";
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(118,211,209,0.25) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .thank-you-card::after {
            content: "";
            position: absolute;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(250,230,43,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Content wrapper */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 880px;
        }

        /* Check icon arriba */
        .check-icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 40px;
            background: var(--arie-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black-seed);
            animation: bounceIn 0.8s ease-out;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); }
        }

        /* Eyebrow */
        .eyebrow {
            display: inline-block;
            color: var(--oxygen-blue);
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        /* Título principal */
        h1 {
            font-size: 72px;
            line-height: 1;
            font-weight: 900;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }
        h1 .highlight {
            color: var(--arie-yellow);
        }

        /* Subtítulo */
        .subtitle {
            font-size: 26px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 48px;
            line-height: 1.4;
            font-weight: 500;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Fecha grande */
        .date-box {
            display: inline-block;
            padding: 32px 64px;
            margin-bottom: 56px;
            background: var(--black-seed);
            border-radius: 24px;
            border: 3px solid var(--arie-yellow);
            position: relative;
        }
        .date-box::before {
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: 32px;
            background: linear-gradient(135deg, rgba(250,230,43,0.35), rgba(118,211,209,0.25));
            z-index: -1;
            filter: blur(24px);
        }
        .date-label {
            color: var(--oxygen-blue);
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .date-big {
            color: var(--arie-yellow);
            font-size: 110px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .date-sep {
            margin: 0 12px;
            opacity: 0.4;
            font-weight: 300;
        }
        .date-year {
            color: rgba(255,255,255,0.55);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 6px;
            margin-top: 10px;
        }

        /* CTA WhatsApp */
        .wa-button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: var(--wa-green);
            color: white;
            padding: 26px 52px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 0.3px;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            box-shadow: 0 12px 36px rgba(37,211,102,0.45);
        }
        .wa-button:hover {
            transform: translateY(-3px);
            background: #1ebe5a;
            box-shadow: 0 16px 44px rgba(37,211,102,0.55);
        }

        .wa-hint {
            margin-top: 20px;
            color: rgba(255,255,255,0.55);
            font-size: 16px;
            font-weight: 500;
            font-style: italic;
        }

        /* Footer bar con marca */
        .brand-bar {
            position: absolute;
            bottom: 32px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .brand-bar .brand {
            color: white;
            font-weight: 800;
        }
        .brand-bar .dot {
            margin: 0 10px;
            opacity: 0.3;
        }

        /* Responsive - importante para móvil */
        @media (max-width: 1100px) {
            .thank-you-card {
                width: 100%;
                height: auto;
                min-height: 100vh;
                padding: 60px 32px 100px;
            }
            h1 { font-size: 48px; }
            .subtitle { font-size: 19px; margin-bottom: 40px; }
            .date-box { padding: 24px 40px; margin-bottom: 40px; }
            .date-big { font-size: 68px; }
            .wa-button { padding: 22px 36px; font-size: 18px; }
            .check-icon { width: 80px; height: 80px; margin-bottom: 32px; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 38px; }
            .date-big { font-size: 52px; white-space: normal; }
            .date-sep { display: none; }
            .date-big::after { content: "\A"; white-space: pre; }
            .eyebrow { font-size: 13px; letter-spacing: 2.5px; }
            .wa-button { padding: 20px 28px; font-size: 16px; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="thank-you-card">
    <div class="content">

        <!-- Check icon animado -->
        <div class="check-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <!-- Eyebrow -->
        <div class="eyebrow">✓ Cupo reservado</div>

        <!-- Título principal -->
        <h1>
            ¡Bienvenido<br>
            al <span class="highlight">Reboot 30</span>!
        </h1>

        <!-- Subtítulo -->
        <p class="subtitle">
            Tu cupo está reservado oficialmente.<br>
            Último paso: únete al grupo exclusivo de WhatsApp.
        </p>

        <!-- Fecha grande -->
        <div class="date-box">
            <div class="date-label">Arranca</div>
            <div class="date-big">4<span class="date-sep">·</span>MAYO</div>
            <div class="date-year">2026</div>
        </div>

        <!-- Botón WhatsApp (link dinámico según ciudad) -->
        <a href="#" id="wa-link" class="wa-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
            </svg>
            Entrar al grupo de WhatsApp
        </a>

        <p class="wa-hint">Tu cupo se confirma cuando entres al grupo</p>

    </div>

    <!-- Brand bar footer -->
    <div class="brand-bar">
        <span class="brand">ReBoot Lifestyle</span>
        <span class="dot">·</span>
        by Arie Reboot
    </div>
</div>

<!-- Script para el link dinámico según ciudad (el programador lo conecta) -->
<script>
(function() {
    // Capturar parámetros de URL
    const params = new URLSearchParams(window.location.search);
    const nombre = params.get('nombre') || '';
    const ciudad = params.get('ciudad') || '';

    // Mapeo de ciudad a link de WhatsApp
    // IMPORTANTE: el programador debe actualizar estos links con los reales
    const grupos = {
        'Ciudad de Panamá': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_1',
        'Panamá Oeste (Arraiján, La Chorrera, Capira)': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_2',
        'Colón': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_3',
        'David / Chiriquí': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_3',
        'Chitré / Herrera / Los Santos': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_3',
        'Santiago / Veraguas': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_3',
        'Otra ciudad de Panamá': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_3',
        'Fuera de Panamá': 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_4'
    };

    // Link por defecto si la ciudad no se pasa en la URL
    const defaultGrupo = 'https://chat.whatsapp.com/REEMPLAZAR_GRUPO_GENERAL';

    // Asignar el link correcto al botón
    const waLink = document.getElementById('wa-link');
    if (waLink) {
        waLink.href = grupos[ciudad] || defaultGrupo;
    }

    // Si el nombre viene en URL, personalizar el H1
    if (nombre) {
        const h1 = document.querySelector('h1');
        if (h1) {
            h1.innerHTML = `¡Bienvenido,<br><span class="highlight">${nombre}</span>!`;
        }
    }

    // Tracking para pixel (cuando esté activo)
    // if (typeof fbq !== 'undefined') fbq('track', 'CompleteRegistration');
    console.log('Thank you page loaded - user:', nombre, 'city:', ciudad);
})();
</script>

</body>
</html>
