<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Story · Quote · Antojos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --cream: #EFEAD8;
    --cream-deep: #E2DCC6;
    --cream-light: #F5F1E2;
    --ink: #1a1a1a;
    --ink-soft: #3a3a3a;
    --ink-mute: #6a6a6a;
    --accent: #c8492c;
    --hairline: rgba(26,26,26,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: #1a1a1a; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.wrap { display:flex; justify-content:center; padding: 40px 16px; }

.story {
    width: 1080px; height: 1920px;
    position: relative; overflow: hidden;
    background: var(--cream);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    color: var(--ink);
}
@media (max-width: 1160px) {
    .story {
        transform-origin: top center;
        transform: scale(calc((100vw - 32px) / 1080));
        margin-bottom: calc(1920px * ((100vw - 32px) / 1080) - 1920px);
    }
}

.story::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background:
        radial-gradient(ellipse 460px 320px at 18% 18%, rgba(0,0,0,0.04), transparent 60%),
        radial-gradient(ellipse 420px 280px at 82% 82%, rgba(0,0,0,0.035), transparent 60%),
        radial-gradient(ellipse 320px 420px at 95% 12%, rgba(0,0,0,0.03), transparent 60%),
        radial-gradient(ellipse at 50% 50%, var(--cream-light), var(--cream-deep));
}
.story::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='480' height='480'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.07 0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.35; mix-blend-mode: multiply;
}
.frame {
    position:absolute; left:60px; right:60px; top:60px; bottom:60px;
    border:1px solid var(--hairline); z-index:2; pointer-events:none;
}
.inner {
    position:absolute; inset:0; z-index:3;
    padding: 180px 110px 180px;
    display:flex; flex-direction:column; justify-content:space-between;
}

.brand {
    font-family: 'Inter'; font-size: 18px; letter-spacing: 7px;
    text-transform: uppercase; font-weight: 800; color: var(--ink);
    text-align: center;
}

.middle { display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: center; }

.q-mark {
    font-family: 'Playfair Display'; font-style: italic;
    font-size: 280px; line-height: 0.5; color: var(--accent);
    text-align: center; margin-bottom: 30px;
    font-weight: 400;
}

.quote {
    font-family: 'Playfair Display'; font-weight: 700;
    font-size: 130px; line-height: 1.04; letter-spacing: -3px;
    text-align: center; color: var(--ink);
}
.quote em { font-style: italic; font-weight: 500; color: var(--accent); }

.subline {
    margin-top: 56px;
    font-family: 'Playfair Display'; font-style: italic;
    font-weight: 500; font-size: 60px; line-height: 1.3;
    color: var(--ink-soft); text-align: center;
    max-width: 800px;
}
.subline em { color: var(--accent); }

.divider { margin: 70px auto 56px; width: 80px; height: 2px; background: var(--accent); }

.cta-block { text-align: center; }
.cta-line {
    font-family: 'Inter'; font-size: 22px; letter-spacing: 5px;
    text-transform: uppercase; font-weight: 700;
    color: var(--ink-mute); margin-bottom: 26px;
}
.cta-pill {
    display: inline-block; background: var(--ink); color: var(--cream-light);
    font-family: 'Inter'; font-weight: 800;
    font-size: 60px; letter-spacing: 6px;
    padding: 26px 64px; position: relative;
}
.cta-pill::before {
    content:''; position: absolute; inset: 0;
    border: 1px solid var(--accent);
    transform: translate(12px, 12px); pointer-events: none;
}
.cta-pill .acc {
    color: #d77555; font-style: italic; font-weight: 500;
    font-family: 'Playfair Display';
}

.bottom { text-align: center; }
.attribution {
    font-family: 'Playfair Display'; font-style: italic;
    font-size: 36px; color: var(--accent);
    font-weight: 500; margin-bottom: 8px;
}
.attribution .by {
    display: block;
    font-family: 'Inter'; font-style: normal;
    font-size: 18px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--ink-mute);
    margin-top: 12px; font-weight: 600;
}

.deco-star {
    position: absolute;
    font-family: 'Playfair Display'; font-style: italic;
    color: var(--accent); opacity: 0.55;
    pointer-events: none; line-height: 1;
}
</style>
</head>
<body>
<div class="wrap">
<div class="story">
    <div class="frame"></div>
    <div class="deco-star" style="top: 240px; left: 150px; font-size: 100px;">✦</div>
    <div class="deco-star" style="top: 280px; right: 150px; font-size: 70px;">✦</div>
    <div class="deco-star" style="bottom: 580px; left: 140px; font-size: 60px;">✦</div>
    <div class="deco-star" style="bottom: 620px; right: 140px; font-size: 80px;">✦</div>
    <div class="inner">
        <div class="brand">REBOOT · LIFESTYLE</div>

        <div class="middle">
            <div class="q-mark">"</div>
            <div class="quote">
                Los antojos<br>
                no son falta<br>
                <em>de voluntad.</em>
            </div>
            <div class="subline">
                Son <em>química</em> — y se pueden hackear<br>en 3 pasos en orden.
            </div>
            <div class="divider"></div>
            <div class="cta-block">
                <div class="cta-line">Mira mi último post</div>
                <div class="cta-pill">
                    <span class="acc">→</span> ANTOJOS
                </div>
            </div>
        </div>

        <div class="bottom">
            <div class="attribution">
                Arie Reboot
                <span class="by">@ariereboot · 30 días gratis · 11 mayo</span>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
