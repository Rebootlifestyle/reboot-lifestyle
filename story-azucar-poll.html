<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Story · Poll Azúcar · Reboot 30</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --cream: #EFEAD8;
    --cream-deep: #E2DCC6;
    --cream-light: #F5F1E2;
    --ink: #1a1a1a;
    --ink-soft: #3a3a3a;
    --ink-mute: #6a6a6a;
    --accent: #c8492c;
    --hairline: rgba(26,26,26,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: #1a1a1a; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.wrap { display:flex; justify-content:center; padding: 30px 16px; }

.story {
    width: 1080px; height: 1920px;
    position: relative; overflow: hidden;
    background: var(--cream);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    color: var(--ink);
}
@media (max-width: 1160px) {
    .story {
        transform-origin: top center;
        transform: scale(calc((100vw - 32px) / 1080));
        margin-bottom: calc(1920px * ((100vw - 32px) / 1080) - 1920px);
    }
}

.story::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background:
        radial-gradient(ellipse 460px 320px at 18% 18%, rgba(0,0,0,0.04), transparent 60%),
        radial-gradient(ellipse 420px 280px at 82% 82%, rgba(0,0,0,0.035), transparent 60%),
        radial-gradient(ellipse 320px 420px at 95% 12%, rgba(0,0,0,0.03), transparent 60%),
        radial-gradient(ellipse at 50% 50%, var(--cream-light), var(--cream-deep));
}
.story::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='480' height='480'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.07 0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.35; mix-blend-mode: multiply;
}
.frame {
    position:absolute; left:60px; right:60px; top:60px; bottom:60px;
    border:1px solid var(--hairline); z-index:2; pointer-events:none;
}
.inner {
    position:absolute; inset:0; z-index:3;
    padding: 160px 110px 200px;
    display:flex; flex-direction:column;
}

.brand {
    font-family: 'Inter'; font-size: 18px; letter-spacing: 7px;
    text-transform: uppercase; font-weight: 800; color: var(--ink);
    text-align: center;
    margin-bottom: 30px;
}

.eyebrow {
    text-align: center;
    font-family: 'Inter'; font-size: 16px; letter-spacing: 6px;
    text-transform: uppercase; font-weight: 700;
    color: var(--accent);
    margin-bottom: 60px;
}

.q-mark {
    font-family: 'Playfair Display'; font-style: italic;
    font-size: 220px; line-height: 0.5; color: var(--accent);
    text-align: center; margin: 30px 0 -10px;
    font-weight: 400;
}

.headline {
    font-family: 'Playfair Display';
    font-weight: 700; font-size: 110px;
    line-height: 1.04; letter-spacing: -2.5px;
    color: var(--ink); text-align: center;
    margin: 30px 0;
}
.headline em {
    font-style: italic; font-weight: 500;
    color: var(--accent);
}

.subline {
    margin-top: 30px;
    font-family: 'Playfair Display'; font-style: italic;
    font-weight: 500; font-size: 44px; line-height: 1.3;
    color: var(--ink-soft); text-align: center;
}

/* The "poll zone" — where Arie places the IG poll sticker on top */
.poll-zone {
    margin: 80px auto 0;
    width: 720px;
    background: rgba(232, 92, 38, 0.08);
    border: 2px dashed rgba(200, 73, 44, 0.5);
    border-radius: 28px;
    padding: 36px 24px;
    text-align: center;
}
.poll-zone .pz-eyebrow {
    font-family: 'Inter'; font-size: 14px; letter-spacing: 4px;
    text-transform: uppercase; font-weight: 700;
    color: var(--accent); margin-bottom: 10px;
    opacity: 0.7;
}
.poll-zone .pz-text {
    font-family: 'Inter'; font-size: 18px; line-height: 1.5;
    color: var(--ink-mute);
    font-weight: 500;
}
.poll-zone .pz-text strong {
    color: var(--ink);
    font-weight: 700;
}

.bottom {
    margin-top: auto;
    text-align: center;
}
.bottom .footer-line {
    font-family: 'Playfair Display'; font-style: italic;
    font-weight: 500; font-size: 32px; color: var(--ink-soft);
    margin-bottom: 14px;
}
.bottom .footer-line strong {
    color: var(--accent); font-style: normal; font-weight: 700;
}
.bottom .by {
    font-family: 'Inter'; font-size: 13px; letter-spacing: 4px;
    text-transform: uppercase; font-weight: 600;
    color: var(--ink-mute);
}

.deco-star {
    position: absolute;
    font-family: 'Playfair Display'; font-style: italic;
    color: var(--accent); opacity: 0.45;
    pointer-events: none; line-height: 1;
}
</style>
</head>
<body>
<div class="wrap">
<div class="story">
    <div class="frame"></div>
    <div class="deco-star" style="top: 220px; left: 130px; font-size: 90px;">✦</div>
    <div class="deco-star" style="top: 260px; right: 150px; font-size: 60px;">✦</div>
    <div class="deco-star" style="bottom: 380px; left: 140px; font-size: 50px;">✦</div>
    <div class="deco-star" style="bottom: 420px; right: 130px; font-size: 70px;">✦</div>
    <div class="inner">
        <div class="brand">REBOOT · LIFESTYLE</div>
        <div class="eyebrow">— Una pregunta —</div>

        <div class="q-mark">"</div>
        <div class="headline">
            ¿Cuántas<br>
            <em>cucharaditas</em><br>
            de azúcar<br>
            comes <em>al día?</em>
        </div>

        <div class="poll-zone">
            <div class="pz-eyebrow">↓ Pon aquí el sticker de Poll ↓</div>
            <div class="pz-text">Opciones sugeridas: <strong>"Menos de 10"</strong>  vs.  <strong>"Más de 10"</strong></div>
        </div>

        <div class="bottom">
            <div class="footer-line">
                Spoiler: la respuesta <strong>te va a sorprender.</strong>
            </div>
            <div class="by">Mira el reel · @ariereboot</div>
        </div>
    </div>
</div>
</div>
</body>
</html>
